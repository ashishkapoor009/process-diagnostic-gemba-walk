version: "3.9"

services:
  streamlit-ui:
    build: .
    image: pe-gemba-agent:latest
    container_name: pe-gemba-streamlit
    command: streamlit run streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

  backend-api:
    build: .
    image: pe-gemba-agent:latest
    container_name: pe-gemba-backend
    command: uvicorn app.main:api --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
